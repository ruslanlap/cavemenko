name: Stale Issues & PRs

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6:00 UTC

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          stale-issue-message: >
            This issue has been inactive for 30 days and will be closed in 7 days
            unless there is new activity. If this is still relevant, please comment
            or remove the `stale` label.
          stale-pr-message: >
            This PR has been inactive for 30 days and will be closed in 7 days
            unless there is new activity. If this is still relevant, please comment
            or remove the `stale` label.
          close-issue-message: 'Closed due to inactivity. Reopen if still relevant.'
          close-pr-message: 'Closed due to inactivity. Reopen if still relevant.'
          days-before-stale: 30
          days-before-close: 7
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
          exempt-issue-labels: 'pinned,security,bug'
          exempt-pr-labels: 'pinned,security'
